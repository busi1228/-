<script>

    const FULLDATA_L2 = {"一、安全物理环境":[{"title":"1.1 物理位置选择","subItems":[{"label":"a) 机房场地应选择在具有防震、防风和防雨等能力的建筑内","compliance":["机房所在建筑具备抗震设计，符合建筑抗震设防标准","机房具备防风能力，建筑结构稳固，门窗密封严密","机房具备防雨能力，屋顶及墙体防水层完好无渗漏"],"nonconform":["机房所在建筑为简易板房，未进行抗震设计。","机房顶部存在渗漏痕迹，未做防水处理。","机房窗户密封性差，风雨可倒灌。"],"suggestion":["迁移至符合抗震标准的建筑或进行抗震加固改造，并出具合格报告。","对屋顶和墙体进行防水改造（如铺设防水卷材）。","更换高密封性门窗，加装密封胶条和防风挡板。"]},{"label":"b) 机房场地应避免设在建筑物的顶层或地下室，否则应加强防水和防潮措施","compliance":["机房未设在地下室，或已按标准完成地下室防水防潮处理","机房地面干燥，无积水渗透痕迹","已安装除湿设备，湿度控制在标准范围内"],"nonconform":["机房设于地下室，未采取防水防潮措施。","地下室内有积水渗透痕迹。","未安装除湿设备，湿度经常超标。"],"suggestion":["如无法迁移，必须做地下室整体防水防潮处理。","封堵所有渗透点，增设排水沟或集水井。","安装工业级除湿机，并设置湿度告警。"]}]},{"title":"1.2 物理访问控制","subItems":[{"label":"机房出入口应安排专人值守或配置电子门禁系统","compliance":["机房出入口已安装电子门禁系统（刷卡/指纹/人脸识别）","已建立进出登记制度，门禁日志自动记录进出人员信息","机房门锁为高安全等级，钥匙管理规范有使用台账"],"nonconform":["机房出入口无门禁系统，也无专人值守。","未对进出人员进行记录。","机房门锁为普通机械锁，钥匙管理混乱。"],"suggestion":["安装电子门禁系统（刷卡/指纹/人脸）。","建立进出登记表或使用门禁日志自动记录。","更换为高安全等级门锁，并建立钥匙管理台账。"]}]},{"title":"1.3 防盗窃和防破坏","subItems":[{"label":"a) 应将设备或主要部件进行固定并设置明显的不易除去的标识","compliance":["服务器和网络设备安装于标准机柜并上锁固定","设备表面有激光雕刻或铆接式永久性资产标识","关键部件（硬盘、电源）已加装物理锁或防拆卸螺丝"],"nonconform":["服务器和网络设备未固定，可随意移动。","设备表面无资产标识或标识易脱落。","主要部件（硬盘、电源）未加锁或固定。"],"suggestion":["将设备安装于标准机柜并上锁固定。","使用激光雕刻或铆接式永久性标识。","对关键部件加装物理锁或防拆卸螺丝。"]},{"label":"b) 应将通信线缆铺设在隐蔽安全处","compliance":["线缆铺设于金属桥架或封闭式线槽内，整齐有序","强弱电线缆分开绑扎，标注清晰可识别","重要线缆走独立封闭通道，并有监控覆盖"],"nonconform":["网线和电源线在地面明敷，人员可踩踏。","线缆杂乱无章，未使用桥架或线槽。","重要线缆经过公共区域，易被破坏。"],"suggestion":["铺设金属桥架或封闭式线槽，将线缆入槽。","强弱电线缆分开绑扎，标注清晰。","重要线缆走独立封闭通道，并设置监控。"]}]},{"title":"1.4 防雷击","subItems":[{"label":"应将各类机柜、设施和设备等通过接地系统安全接地","compliance":["机房已建设联合接地系统，所有设备接入接地排","防雷接地电阻值测试合格（小于4Ω）","总配电箱和重要设备前端已安装浪涌保护器（SPD）"],"nonconform":["机房未设置接地排，设备外壳未接地。","防雷接地电阻值不符合规范（大于4Ω）。","未安装浪涌保护器（SPD）。"],"suggestion":["建设联合接地系统，设备全部接入接地排。","对接地电阻进行测试，整改至小于4Ω。","在总配电箱和重要设备前安装SPD。"]}]},{"title":"1.5 防火","subItems":[{"label":"a) 机房应设置火灾自动消防系统","compliance":["机房已安装点式或吸气式烟雾探测器，覆盖全部区域","已配置自动灭火系统（七氟丙烷/气溶胶等气体灭火装置）","消防报警系统已接入建筑消防 。","配置严格的访问控制策略，仅开放必要端口和服务。","关闭或管控所有未经授权的无线AP，统一接入并认证。"]}]},{"title":"3.2 访问控制","subItems":[{"label":"a) 设置访问控制规则默认拒绝","compliance":["防火墙默认策略已设置为拒绝所有，按需添加允许规则","已删除any到any的宽泛规则，仅开放必要IP和端口","已建立每月评审一次访问控制规则的制度"],"nonconform":["防火墙规则中存在'permit any any'的宽泛规则。","默认策略未设置为拒绝，存在隐式允许。","未按最小权限原则配置规则。"],"suggestion":["修改默认策略为'拒绝所有'，再按需添加允许规则。","删除any到any的规则，仅开放必要IP和端口。","每月评审一次访问控制规则。"]},{"label":"b) 删除多余规则，规则最小化","compliance":["已梳理所有ACL规则，删除无效和重复规则","规则数量已精简至合理范围，无冗余和冲突","已建立每季度规则评审和清理制度并执行"],"nonconform":["ACL中存在大量已停用业务或老旧IP的规则。","规则存在冗余、重叠或冲突。","无定期清理机制，规则数量超过100条且无人维护。"],"suggestion":["梳理所有ACL规则，删除无效、重复规则。","合并相似规则，将规则数量减少至合理范围（如50条以内）。","建立每季度规则评审和清理制度。"]},{"label":"c) 检查五元组","compliance":["防火墙已启用基于五元组（源/目的IP、端口、协议）的过滤","已启用状态检测功能，对连接进行跟踪","对UDP、ICMP按需开放并设置速率限制"],"nonconform":["仅检查IP地址，未检查端口和协议。","防火墙配置为透传模式，不做五元组过滤。","对UDP、ICMP协议未做限制。"],"suggestion":["配置防火墙基于五元组（源/目的IP、源/目的端口、协议）进行过滤。","启用状态检测功能。","对UDP、ICMP按需开放，并设置速率限制。"]},{"label":"d) 基于会话状态允许/拒绝","compliance":["防火墙已启用状态检测功能（SPI），具备会话状态跟踪","已配置基于会话状态的规则（允许已建立会话的数据返回）","会话超时时间已合理设置（TCP 3600秒，UDP 120秒）"],"nonconform":["防火墙工作于包过滤模式，无会话状态跟踪。","无法识别会话的建立、维持和拆除状态。","无会话表超时配置。"],"suggestion":["启用防火墙状态检测功能（SPI）。","配置基于会话状态的规则（如允许已建立会话的数据返回）。","设置合理的会话超时时间（如TCP 3600秒，UDP 120秒）。"]}]},{"title":"3.3 入侵防范","subItems":[{"label":"监视网络攻击行为","compliance":["核心交换机旁路已部署IDS或在边界已部署IPS","攻击特征库已配置自动每周更新","已建立每周告警分析机制，发现告警及时处置"],"nonconform":["网络中未部署入侵检测/防御系统（IDS/IPS）。","已部署但未定期更新攻击特征库。","未对网络流量进行实时监控和分析。"],"suggestion":["在核心交换机旁路部署IDS或在边界部署IPS。","配置攻击特征库自动每周更新。","建立每周告警分析机制，及时处置。"]}]},{"title":"3.4 恶意代码防范","subItems":[{"label":"检测清除恶意代码并更新","compliance":["互联网出口已部署防病毒网关或UTM防病毒模块","病毒库设置为每日自动升级，保持最新版本","已启用对HTTP、FTP、SMTP等协议的实时扫描和阻断"],"nonconform":["网络边界未部署防病毒网关或邮件过滤系统。","已部署但病毒库更新滞后超过一个月。","未对HTTP、FTP、SMTP协议进行病毒扫描。"],"suggestion":["在互联网出口部署防病毒网关或UTM防病毒模块。","设置病毒库每日自动升级。","启用对HTTP、FTP、SMTP等协议的实时扫描和阻断。"]}]},{"title":"3.5 安全审计","subItems":[{"label":"a) 网络边界审计覆盖每个用户","compliance":["边界设备已启用日志记录功能（会话、NAT、ACL匹配等）","日志包含用户名信息（通过认证后关联记录）","管理员登录、规则变更 告","总配电箱和重要设备前端已安装浪涌保护器（SPD）"],"nonconform":["机房未设置接地排，设备外壳未接地","防雷接地电阻值不符合规范（大于4Ω）","未安装浪涌保护器（SPD）"],"suggestion":["建设联合接地系统，所有设备接入接地排","对接地电阻进行测试并整改至小于4Ω，每年复测一次","在总配电箱和重要设备前端安装相应等级的SPD"]},{"label":"b) 应采取措施防止感应雷，例如设置防雷保安器或过压保护装置等","compliance":["电源进线处已安装B+C级复合SPD","信号线（网线、电话线）已安装信号防雷器（SPD）","所有SPD均处于有效期内，状态指示灯正常"],"nonconform":["仅安装了电源SPD，信号线未安装防雷器","防雷器未定期检查或已劣化失效","防雷器类型与防护等级不匹配"],"suggestion":["在电源进线处安装B+C级复合型SPD","为所有进出机房的信号线（网线、电话线）安装信号SPD","每半年检查一次SPD状态，及时更换劣化模块"]}]},{"title":"1.5 防火","subItems":[{"label":"a) 机房应设置火灾自动消防系统，能够自动检测火情、自动报警，并自动灭火","compliance":["机房已安装点式或吸气式烟雾探测器，覆盖全部区域，灵敏度满足早期报警需求","已配置自动气体灭火系统（七氟丙烷/IG541），并与消防控制中心联动","已设置声光报警器和紧急启停按钮，灭火系统每半年检测一次"],"nonconform":["机房未安装烟雾探测器或感温探测器","无自动灭火装置，仅配备手提灭火器","虽有气体灭火但未与消防控制中心联动"],"suggestion":["安装吸气式或高灵敏度点式烟雾探测器，实现全覆盖","配置自动气体灭火系统（推荐七氟丙烷或IG541），确保灭火剂储量充足","接入建筑消防控制中心，每半年进行一次消防联动测试"]},{"label":"b) 机房及相关的工作房间和辅助房应采用具有耐火等级的建筑材料","compliance":["机房隔断采用A级防火材料（岩棉彩钢板），耐火极限≥2小时","天花板和墙面使用阻燃材料装修","所有装饰材料均具备耐火等级检测报告并归档保存"],"nonconform":["隔断使用普通木工板或石膏板（不防火）","天花板和墙面未使用阻燃材料","未提供材料耐火等级证明"],"suggestion":["更换为A级防火隔断（如岩棉彩钢板），耐火极限≥2小时","使用阻燃涂料处理现有可燃材料或重新装修","收集并保存所有装饰材料的耐火检测报告"]},{"label":"c) 应对机房划分区域进行管理，区域和区域之间设置隔离防火措施","compliance":["机房已按功能划分为主机区、配电区、空调区、操作区等独立防火分区","各区域之间已设置防火隔墙或防火卷帘，耐火极限≥1小时","每个防火分区均有独立的消防探测和灭火装置"],"nonconform":["机房无防火分区划分，整个机房为一个区域","主机区和配电区之间无防火隔离","未设置防火隔墙或防火卷帘"],"suggestion":["按功能划分防火分区（主机区、配电区、空调区、操作区），设置防火隔墙或防火卷帘","确保各分区之间的防火隔离设施耐火极限≥1小时","每个防火分区配备独立的消防探测和灭火装置"]}]},{"title":"1.6 防水和防潮","subItems":[{"label":"a) 应采取措施防止雨水通过机房窗户、屋顶和墙壁渗透","compliance":["机房窗户已封堵或使用高密封性门窗，无渗水现象","屋顶无裂缝，已做防水卷材处理并通过闭水试验","外墙已涂刷防水涂料，定期巡检无异常"],"nonconform":["机房有窗户且未密封，雨季存在渗水现象","屋顶有裂缝，下雨漏水","外墙未做防水涂层"],"suggestion":["封堵或拆除机房窗户，改为实体墙","修补屋顶裂缝并铺设防水卷材，做闭水试验验证","外墙涂刷防水涂料，每季度巡检一次"]},{"label":"b) 应采取措施防止机房内水蒸气结露和地下积水的转移与渗透","compliance":["空调排水管道独立引至室外或专用排水井，无反水风险","冷媒管和送风管已做保温处理，无结露现象","地板下已安装漏水检测绳并接入环境监控系统，支持自动告警"],"nonconform":["空调排水管直接接入机房地漏，存在反水风险","未对冷媒管和送风管做防结露保温处理","地板下无漏水检测传感器"],"suggestion":["空调排水管独立引至室外或专用排水井","对冷媒     function makeCheckKey(ch,ci,si,ii,cat,sm,tp){const t=tp||'';const sf=t?'_'+t+'_'+ii:'_'+ii;if(cat&&sm)return ch+'_'+cat+'_'+sm+'_'+ci+'_'+si+sf;return ch+'_'+ci+'_'+si+sf}
    function getNaKey(ch,ci,si,cat,sm){if(cat&&sm)return ch+'_'+cat+'_'+sm+'_'+ci+'_'+si;return ch+'_'+ci+'_'+si}

    function getSelectedComplianceTexts(ch,ci,si,cat,sm){const s=fullData[ch][ci].subItems[si];if(!s.compliance||!s.compliance.length)return[];const r=[];for(let i=0;i<s.compliance.length;i++){const k=makeCheckKey(ch,ci,si,i,cat,sm,'c');if(checkState[k]){const t=editedLabels[k]||s.compliance[i];r.push((i+1)+'. '+t)}}return r}
    function getSelectedNonconformTexts(ch,ci,si,cat,sm){const s=fullData[ch][ci].subItems[si];if(!s.nonconform||!s.nonconform.length)return[];const r=[];for(let i=0;i<s.nonconform.length;i++){const k=makeCheckKey(ch,ci,si,i,cat,sm);if(checkState[k]){const t=editedLabels[k]||s.nonconform[i];r.push((i+1)+'. '+t)}}return r}
    function getSelectedSuggestionTexts(ch,ci,si,cat,sm){const s=fullData[ch][ci].subItems[si];if(!s.suggestion||!s.suggestion.length)return[];const r=[];for(let i=0;i<s.suggestion.length;i++){if(checkState[makeCheckKey(ch,ci,si,i,cat,sm)])r.push((i+1)+'. '+s.suggestion[i])}return r}

    function updateRecorders(ch,ci,si,cat,sm){const rk=cat&&sm?ch+'_'+cat+'_'+sm+'_'+ci+'_'+si:ch+'_'+ci+'_'+si;const nk=getNaKey(ch,ci,si,cat,sm);if(naState[nk]){suggestionRecords[rk]=''}else{const ct=getSelectedComplianceTexts(ch,ci,si,cat,sm);const nt=getSelectedNonconformTexts(ch,ci,si,cat,sm);const st=getSelectedSuggestionTexts(ch,ci,si,cat,sm);const all=[...ct,...nt];const rn=all.map((t,idx)=>t.replace(/^\d+\./,(idx+1)+'.'));resultRecords[rk]=rn.join('\n');suggestionRecords[rk]=st.join('\n')}const ei=cat&&sm?'recorder_result_'+ch+'_'+cat+'_'+sm+'_'+ci+'_'+si:'recorder_result_'+ch+'_'+ci+'_'+si;const si2=cat&&sm?'recorder_sug_'+ch+'_'+cat+'_'+sm+'_'+ci+'_'+si:'recorder_sug_'+ch+'_'+ci+'_'+si;const rt=document.getElementById(ei);const st2=document.getElementById(si2);if(rt)rt.value=resultRecords[rk]||'';if(st2)st2.value=suggestionRecords[rk]||'';saveState()}

    function applyStatusToControl(ch,ci,si,cat,sm,status){const s=fullData[ch][ci].subItems[si];const nk=getNaKey(ch,ci,si,cat,sm);const rk=cat&&sm?ch+'_'+cat+'_'+sm+'_'+ci+'_'+si:ch+'_'+ci+'_'+si;if(status==='na'){if(s.compliance)for(let i=0;i<s.compliance.length;i++)checkState[makeCheckKey(ch,ci,si,i,cat,sm,'c')]=false;for(let i=0;i<s.nonconform.length;i++)checkState[makeCheckKey(ch,ci,si,i,cat,sm)]=false;naState[nk]=true;resultRecords[rk]=NA_DEFAULT_TEXT;suggestionRecords[rk]=''}else{if(naState[nk])delete naState[nk];if(s.compliance)for(let i=0;i<s.compliance.length;i++)checkState[makeCheckKey(ch,ci,si,i,cat,sm,'c')]=(status==='compliant');for(let i=0;i<s.nonconform.length;i++)checkState[makeCheckKey(ch,ci,si,i,cat,sm)]=(status==='noncompliant')}updateRecorders(ch,ci,si,cat,sm);renderProgressSidebar();updateReportPreview()}

    function handleCheckChange(e){const cb=e.target;const ch=cb.dataset.chapter;const ci=parseInt(cb.dataset.ctrl);const si=parseInt(cb.dataset.subidx||0);const ii=parseInt(cb.dataset.itemidx);const cat=cb.dataset.category||null;const sm=cb.dataset.submodule||null;const tp=cb.dataset.type||'';checkState[makeCheckKey(ch,ci,si,ii,cat,sm,tp)]=cb.checked;const nk=getNaKey(ch,ci,si,cat,sm);if(naState[nk])delete naState[nk];updateRecorders(ch,ci,si,cat,sm);renderProgressSidebar();updateReportPreview()}

    function calcChapterProgress(cn){if(isSubModuleChapter(cn)){let t=0,d=0;const cs=fullData[cn];for(let cat of categories)for(let sm of subModules[cat])for(let ci=0;ci<cs.length;ci++){const ss=cs[ci].subItems;for(let si=0;si<ss.length;si++){const nk=getNaKey(cn,ci,si,cat,sm);t++;if(naState[nk]){d++;continue}const s=ss[si];let done=false;if(s.compliance)for(let i=0;i<s.compliance.length&&!done;i++)if(checkState[makeCheckKey(cn,ci,si,i,cat,sm,'c')])done=true;for(let i=0;i<s.nonconform.length&&!done;i++)if(checkState[makeCheckKey(cn,ci,si,i,cat,sm)])done=true;if(done)d++}}return t===0?0:Math.round((d/t)*100)}let t=0,d=0;const cs=fullData[cn];for(let ci=0;ci<cs.length;ci++){const ss=cs[ci].subItems;for(let si=0;si<ss.length;si++){const nk=getNaKey(cn,ci,si,null,null);t++;if(naState[nk]){d++;continue}const s=ss[si];let done=false;if(s.compliance)for(let i=0;i<s.compliance.length&&!done;i++)if(checkState[makeCheckKey(cn,ci,si,i,null,null,'c')])done=true;for(let i=0;i<s.nonconform.length&&!done;i++)if(checkState[makeCheckKey(cn,ci,si,i)])done=true;if(done)d++}}return t===0?0:Math.round((d/t)*100)}

    function escapeHtml(s){return s.replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]))}

        const ws=XLSX.utils.aoa_to_sheet(rows);const css={alignment:{horizontal:"center",vertical:"center",wrapText:true}};for(let R=0;R<rows.length;R++)for(let C=0;C<7;C++){const ref=XLSX.utils.encode_cell({r:R,c:C});if(ws[ref])ws[ref].s=css}
        const mgs2=[];for(let col=0;col<=2;col++){let start=-1;for(let r=1;r<rows.length;r++){if(rows[r][col]&&rows[r][col]===(r>1?rows[r-1][col]:null)&&(col===2?(rows[r-1][1]===rows[r][1]):true)){if(start<0)start=r-1}else{if(start>=0&&r-start>1)mgs2.push({s:{r:start,c:col},e:{r:r-1,c:col}});start=-1}}if(start>=0&&rows.length-start>1)mgs2.push({s:{r:start,c:col},e:{r:rows.length-1,c:col}})}ws['!merges']=mgs.concat(mgs2);ws['!cols']=[{wch:18},{wch:12},{wch:16},{wch:35},{wch:35},{wch:40},{wch:40}];const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,"等保二级整改报告");XLSX.writeFile(wb,'dengbao_'+new Date().toISOString().slice(0,10)+'.xlsx')}

    function generateReport(){let r="# 等保二级整改报告\n\n";for(let ch of chapters){let chs=false,cr="";if(isSubModuleChapter(ch)){const cs=fullData[ch];for(let cat of categories){let cats=false,ctr="";for(let sm of subModules[cat]){let sms=false,sr="";for(let ci=0;ci<cs.length;ci++){const ss=cs[ci].subItems;for(let si=0;si<ss.length;si++){if(naState[getNaKey(ch,ci,si,cat,sm)])continue;const s=ss[si];const cs2=[],ns=[],ss2=[];if(s.compliance)for(let i=0;i<s.compliance.length;i++)if(checkState[makeCheckKey(ch,ci,si,i,cat,sm,'c')])cs2.push(s.compliance[i]);for(let i=0;i<s.nonconform.length;i++)if(checkState[makeCheckKey(ch,ci,si,i,cat,sm)]){ns.push(s.nonconform[i]);if(s.suggestion[i])ss2.push(s.suggestion[i])}if(!cs2.length&&!ns.length)continue;sms=true;sr+='#### '+cs[ci].title+' - '+(s.label||'')+'\n\n';if(cs2.length){sr+='**符合项：**\n\n';cs2.forEach((t,i)=>sr+=(i+1)+'. '+t+'\n');sr+='\n'}if(ns.length){sr+='**不符合项：**\n\n';ns.forEach((t,i)=>sr+=(i+1)+'. '+t+'\n');sr+='\n**整改意见：**\n\n';ss2.forEach((t,i)=>sr+=(i+1)+'. '+t+'\n')}sr+='\n---\n\n'}}if(sms){cats=true;ctr+='### '+cat+' - '+sm+'\n\n'+sr}}if(cats){chs=true;cr+='## '+ch+' > '+cat+'\n\n'+ctr}}}else{const cs=fullData[ch];cr='## '+ch+'\n\n';for(let ci=0;ci<cs.length;ci++){const ss=cs[ci].subItems;for(let si=0;si<ss.length;si++){if(naState[getNaKey(ch,ci,si,null,null)])continue;const s=ss[si];const cs2=[],ns=[],ss2=[];if(s.compliance)for(let i=0;i<s.compliance.length;i++)if(checkState[makeCheckKey(ch,ci,si,i,null,null,'c')])cs2.push(s.compliance[i]);for(let i=0;i<s.nonconform.length;i++)if(checkState[makeCheckKey(ch,ci,si,i)]){ns.push(s.nonconform[i]);if(s.suggestion[i])ss2.push(s.suggestion[i])}if(!cs2.length&&!ns.length)continue;chs=true;cr+='### '+cs[ci].title+' - '+(s.label||'')+'\n\n';if(cs2.length){cr+='**符合项：**\n\n';cs2.forEach((t,i)=>cr+=(i+1)+'. '+t+'\n');cr+='\n'}if(ns.length){cr+='**不符合项：**\n\n';ns.forEach((t,i)=>cr+=(i+1)+'. '+t+'\n');cr+='\n**整改意见：**\n\n';ss2.forEach((t,i)=>cr+=(i+1)+'. '+t+'\n')}cr+='\n---\n\n'}}}if(chs)r+=cr}return r==="# 等保二级整改报告\n\n"?"（未勾选任何条目）":r}
    function updateReportPreview(){document.getElementById('reportPreview').innerText=generateReport()}

    function selectAllCurrentChapter(){const ch=chapters[currentChapterIndex];if(isSubModuleChapter(ch)){const cs=fullData[ch];for(let cat of categories)for(let sm of subModules[cat])for(let ci=0;ci<cs.length;ci++){const ss=cs[ci].subItems;for(let si=0;si<ss.length;si++){const nk=getNaKey(ch,ci,si,cat,sm);if(naState[nk])delete naState[nk];const s=ss[si];if(s.compliance)for(let i=0;i<s.compliance.length;i++){const k=makeCheckKey(ch,ci,si,i,cat,sm,'c');if(!checkState[k])checkState[k]=true}for(let i=0;i<s.nonconform.length;i++){const k=makeCheckKey(ch,ci,si,i,cat,sm);if(!checkState[k])checkState[k]=true}updateRecorders(ch,ci,si,cat,sm)}}}else{const cs=fullData[ch];for(let ci=0;ci<cs.length;ci++){const ss=cs[ci].subItems;for(let si=0;si<ss.length;si++){const nk=getNaKey(ch,ci,si,null,null);if(naState[nk])delete naState[nk];const s=ss[si];if(s.compliance)for(let i=0;i<s.compliance.length;i++){const k=makeCheckKey(ch,ci,si,i,null,null,'c');if(!checkState[k])checkState[k]=true}for(let i=0;i<s.nonconform.length;i++){const k=makeCheckKey(ch,ci,si,i);if(!checkState[k])checkState[k]=true}updateRecorders(ch,ci,si)}}}fullRender()}
    function clearAllCurrentChapter(){const ch=chapters[currentChapterIndex];if(isSubModuleChapter(ch)){const cs=fullData[ch];for(let cat of categories)for(let sm of subModules[cat])for(let ci=0;ci<cs.length;ci++){const ss=cs[ci].subItems;for(let si=0;si<ss.length;si++){const nk=getNaKey(ch,ci,si,cat,sm);if(naState[nk])delete naState[nk];const s=ss[si];if(s.compliance)for(let i=0;i<s.compliance.length;i++){const k=makeCheckKey(ch,ci,si,i,cat,sm,'c');if(checkState[k])delete checkState[k]}for(let i=0;i<s.nonconform.length;i++){const k=makeCheckKey(ch,ci,si,i,cat,sm);if(checkState[k])delete checkState[k]}updateRecorders(ch,ci,si,cat,sm)}}}else{const cs=fullData[ch];for(let ci=0;ci<cs.length;ci++){const ss=cs[ci].subItems;for(let si=0;si<ss.length;si++){const nk=getNaKey(ch,ci,si,null,null);if(naState[nk])delete naState[nk];const s=ss[si];if(s.compliance)for(let i=0;i<s.compliance.length;i++){const k=makeCheckKey(ch,ci,si,i,null,null,'c');if(checkState[k])delete checkState[k]}for(let i=0;i<s.nonconform.length;i++){const k=makeCheckKey(ch,ci,si,i);if(checkState[k])delete checkState[k]}updateRecorders(ch,ci,si)}}}fullRender()}
    function selectAllCurrentCategory(){const ch=chapters[currentChapterIndex];if(!isSubModuleChapter(ch))return;const cs=fullData[ch];const cat=currentCategory;for(let sm of subModules[cat])for(let ci=0;ci<cs.length;ci++){const ss=cs[ci].subItems;for(let si=0;si<ss.length;si++){const nk=getNaKey(ch,ci,si,cat,sm);if(naState[nk])delete naState[nk];const s=ss[si];if(s.compliance)for(let i=0;i<s.compliance.length;i++){const k=makeCheckKey(ch,ci,si,i,cat,sm,'c');if(!checkState[k])checkState[k]=true}for(let i=0;i<s.nonconform.length;i++){const k=makeCheckKey(ch,ci,si,i,cat,sm);if(!checkState[k])checkState[k]=true}updateRecorders(ch,ci,si,cat,sm)}}fullRender()}
    function createSubModule(cat){const n=prompt('子模块名称（如：核心路由器）：');if(!n||!n.trim())return;const t=n.trim();if(subModules[cat].includes(t)){alert('已存在');return}subModules[cat].push(t);currentCategory=cat;currentSubModule=t;fullRender();saveState()}
    function deleteSubModule(cat,nm){if(!confirm('删除子模块 "'+nm+'"？'))return;const ch="四、安全计算环境";const cs=fullData[ch];for(let ci=0;ci<cs.length;ci++){const ss=cs[ci].subItems;for(let si=0;si<ss.length;si++){const s=ss[si];if(s.compliance)for(let i=0;i<s.compliance.length;i++){const k=makeCheckKey(ch,ci,si,i,cat,nm,'c');if(checkState[k])delete checkState[k]}for(let i=0;i<s.nonconform.length;i++){const k=makeCheckKey(ch,ci,si,i,cat,nm);if(checkState[k])delete checkState[k]}const nk=getNaKey(ch,ci,si,cat,nm);if(naState[nk])delete naState[nk];const rk=ch+'_'+cat+'_'+nm+'_'+ci+'_'+si;if(resultRecords[rk])delete resultRecords[rk];if(suggestionRecords[rk])delete suggestionRecords[rk]}}const idx=subModules[cat].indexOf(nm);if(idx>-1)subModules[cat].splice(idx,1);if(currentSubModule===nm)currentSubModule=subModules[cat].length>0?subModules[cat][0]:null;fullRender();saveState()}

    function expandAll(){document.querySelectorAll('.control-body').forEach(b=>b.style.display='block')}
    function collapseAll(){document.querySelectorAll('.control-body').forEach(b=>b.style.display='none')}
    function copyPreview(){navigator.clipboard.writeText(generateReport()).then(()=>alert('Copied')).catch(()=>alert('Failed'))}
    function searchEntries(){const kw=document.getElementById('searchInput').value.trim().toLowerCase();const cards=document.querySelectorAll('.control-card');if(!kw){cards.forEach(c=>c.style.display='block');return}cards.forEach(card=>{const t=(card.querySelector('.control-header span')?.innerText||'').toLowerCase();const ls=card.querySelectorAll('.check-item label');let m=t.includes(kw);if(!m)for(let l of ls){if(l.innerText.toLowerCase().includes(kw)){m=true;break}}card.style.display=m?'block':'none'})}
    function clearSearch(){document.getElementById('searchInput').value='';document.querySelectorAll('.control-card').forEach(c=>c.style.display='block')}

    function fullRender(){renderProgressSidebar();renderControlList();document.getElementById('currentChapterTitle').innerText=chapters[currentChapterIndex];updateReportPreview()}

    function init(){
        const sl=localStorage.getItem('currentLevel');if(sl==='l3'){currentLevel='l3';fullData=FULLDATA_L3;document.getElementById('tabL2').className='level-tab';document.getElementById('tabL3').className='level-tab active'}
        else{currentLevel='l2';fullData=FULLDATA_L2}
        const saved=loadState();if(saved&&saved.checkState&&Object.keys(saved.checkState).length>0){if(confirm('检测到上次保存的数据，是否恢复？'))restoreState(saved)}
        fullRender();
        document.getElementById('tabL2').onclick=function(){switchLevel('l2')};
        document.getElementById('tabL3').onclick=function(){switchLevel('l3')};
        document.getElementById('selectAllChapterBtn').onclick=selectAllCurrentChapter;
        document.getElementById('selectAllCategoryBtn').onclick=selectAllCurrentCategory;
        document.getElementById('clearAllChapterBtn').onclick=clearAllCurrentChapter;
        document.getElementById('expandAllBtn').onclick=expandAll;
        document.getElementById('collapseAllBtn').onclick=collapseAll;
        document.getElementById('exportExcelBtn').onclick=exportToExcel;
        document.getElementById('copyPreviewBtn').onclick=copyPreview;
        document.getElementById('refreshPreviewBtn').onclick=updateReportPreview;
        document.getElementById('searchBtn').onclick=searchEntries;
        document.getElementById('clearSearchBtn').onclick=clearSearch;
        document.getElementById('searchInput').addEventListener('keypress',e=>{if(e.key==='Enter')searchEntries()});
        document.getElementById('exportDataBtn').onclick=exportData;
        document.getElementById('importDataBtn').onclick=importData;
        document.getElementById('clearDataBtn').onclick=clearAllData;
    }
    init();

</script>
